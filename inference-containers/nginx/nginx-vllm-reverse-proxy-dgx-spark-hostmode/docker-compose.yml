services:
  nginx:
    image: nginx:latest
    container_name: nginx-proxy-hostmode
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "inference-server:${DGX_IP}"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-proxy/ssl/nginx-selfsigned.crt:/etc/nginx/ssl/nginx-selfsigned.crt:ro
      - ./nginx-proxy/ssl/nginx-selfsigned.key:/etc/nginx/ssl/nginx-selfsigned.key:ro
      - ./logs:/var/log/nginx
    networks:
      - development-network

networks:
  development-network:
    external: true