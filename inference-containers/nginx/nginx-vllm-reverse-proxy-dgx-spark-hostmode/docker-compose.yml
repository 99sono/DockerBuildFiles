services:
  nginx:
    image: nginx:latest
    container_name: nginx-proxy-hostmode
    network_mode: "host"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-proxy/ssl/nginx-selfsigned.crt:/etc/nginx/ssl/nginx-selfsigned.crt:ro
      - ./nginx-proxy/ssl/nginx-selfsigned.key:/etc/nginx/ssl/nginx-selfsigned.key:ro
      - ./logs:/var/log/nginx
