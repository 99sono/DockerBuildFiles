events {
    worker_connections 1024;
}

http {
    # Disable request/response buffering for streaming
    proxy_buffering off;
    proxy_request_buffering off;

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/nginx-selfsigned.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx-selfsigned.key;

        # Security hardening
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Increased timeouts for long LLM generation requests (up to 10 min)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;

        # Block the vulnerable /invocations endpoint
        location = /invocations {
            return 403;
        }

        # Proxy everything else to vLLM
        location / {
            # Allow up to 100MB request body size — prevents "413 Request Entity Too Large" errors
            # caused by large LLM request payloads (long conversation contexts, image attachments, etc.)
            client_max_body_size 100M;

            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}