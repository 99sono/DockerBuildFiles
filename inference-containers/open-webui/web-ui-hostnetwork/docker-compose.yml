services:
  open-webui-host:
    image: ghcr.io/open-webui/open-webui:latest
    platform: linux/arm64
    container_name: open-webui-host
    hostname: web-ui-server
    # Ports commented out to ensure communication is done via the nginx proxy on HTTPS.
    # The web UI is now accessible at https://spark01/ instead of http://spark01:11435/.
    # To restore direct HTTP access, uncomment below and remove from nginx.conf routing.
    # ports:
    #   - "11435:8080"
    volumes:
      - open-webui-host:/app/backend/data
    environment:
      - OPENAI_API_BASE_URL=${INFERENCE_SERVER_URL:-http://192.168.1.55:8000/v1}
      - OPENAI_API_KEY=${INFERENCE_API_KEY:-dummy-key}
      - WEBUI_AUTH=${WEBUI_AUTH:-false}
    restart: no
    networks:
      - development-network

volumes:
  open-webui-host:

networks:
  development-network:
    external: true
