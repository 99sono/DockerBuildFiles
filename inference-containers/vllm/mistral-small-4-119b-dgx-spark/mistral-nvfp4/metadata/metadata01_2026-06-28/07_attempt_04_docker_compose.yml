services:
  mistral-small4-119b-nvfp4:
    image: vllm/vllm-openai:nightly
    container_name: mistral-small4-119b-nvfp4-nightly
    hostname: inference-server
    platform: linux/arm64
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - /dev/shm:/dev/shm
    shm_size: "16g"
    ipc: host

    mem_limit: 100g
    memswap_limit: 100g

    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

    environment:
      VLLM_WORKER_MULTIPROC_METHOD: spawn
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      FLASHINFER_DISABLE_VERSION_CHECK: "1"
      CUTE_DSL_ARCH: sm_121a
      VLLM_USE_RUST_FRONTEND: "0"
      TRANSFORMERS_OFFLINE: "0"
      HF_HUB_OFFLINE: "0"
      GLOO_SOCKET_IFNAME: eth0
      NCCL_SOCKET_IFNAME: eth0
      TP_SOCKET_IFNAME: eth0
      OMPI_MCA_btl_tcp_if_include: eth0
      MN_IF_NAME: eth0

      # --- NVIDIA FORUM WORKAROUNDS (2026-03-17) ---
      # MLA (head_size=320) not supported on SM 12.1a by all backends.
      # Disable to fall back to standard attention (larger KV cache but stable).
      VLLM_MLA_DISABLE: "1"

    command:
      - "--model"
      - "mistralai/Mistral-Small-4-119B-2603-NVFP4"
      - "--served-model-name"
      - "${INFERENCE_MODEL_ALIAS:-mistral-small4-119b}"
      - "--api-key"
      - "${INFERENCE_API_KEY:-dummy-key}"
      - "--trust-remote-code"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "${INFERENCE_SERVER_PORT:-8000}"

      # --- MEMORY & CONTEXT ---
      # 40K cap = NVIDIA's proven max with standard attention + 66 GB model.
      # Model loads to ~66 GiB on 128 GB UMA.
      - "--gpu-memory-utilization"
      - "0.75"
      - "--max-model-len"
      - "40000"
      - "--max-num-seqs"
      - "3"

      # --- BATCHING ---
      - "--max-num-batched-tokens"
      - "8192"

      # --- ARCHITECTURE ---
      # Standard attention (MLA disabled via env var), flashinfer backend.
      - "--dtype"
      - "auto"
      - "--kv-cache-dtype"
      - "fp8"
      - "--attention-backend"
      - "flashinfer"
      - "--moe-backend"
      - "marlin"
      - "--enable-prefix-caching"
      - "--enable-chunked-prefill"

      # --- MISTRAL NATIVE FORMATS ---
      - "--tokenizer-mode"
      - "mistral"
      - "--config-format"
      - "mistral"
      - "--load-format"
      - "mistral"

      # --- CRASH AVOIDANCE ---
      - "--enforce-eager"

      # --- PARSERS ---
      - "--tool-call-parser"
      - "mistral"
      - "--enable-auto-tool-choice"
      - "--reasoning-parser"
      - "mistral"

    networks:
      - development-network

networks:
  development-network:
    external: true
