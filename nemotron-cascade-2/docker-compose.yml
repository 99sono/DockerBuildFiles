# Nemotron Cascade 2 on RTX 5090 (Blackwell)
services:
  nemotron-cascade:
    image: vllm/vllm-openai:latest
    container_name: nemotron-cascade-2
    hostname: nemotron-cascade-2
    platform: linux/amd64
    ports:
      - "8000:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    ipc: host   
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]    
    environment:
      # Forcing V0 is mandatory for the 5090 right now to avoid the IPC/handshake crash
      - VLLM_USE_V1=0 
      # Fixes a common multiprocessing bug in WSL2 where the GPU and CPU lose sync
      - VLLM_WORKER_MULTIPROC_METHOD=spawn 
    command: 
      - "--model"
      - "nvidia/Nemotron-Cascade-2-30B-A3B"
      - "--trust-remote-code"
      - "--dtype"
      - "half"
      # --- STABILITY TWEAKS FOR 5090 ---
      # Lowering this to 0.70 ensures 10GB of VRAM is free. 
      # If this works, we can try 0.85 later.
      - "--gpu-memory-utilization"
      - "0.50" 
      # Absolutely required to stop the "Profiling" crash on Blackwell
      - "--enforce-eager"
      # Limits the memory spike during the initial "warmup"
      - "--max-model-len"
      - "4096" 
      # Moves the short-term memory to 8-bit to keep VRAM usage flat
      - "--kv-cache-dtype"
      - "fp8"
      
    networks:
      - development-network

networks:
  development-network:
    external: true