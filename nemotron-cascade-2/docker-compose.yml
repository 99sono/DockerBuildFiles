# Nemotron-Cascade-2-30B-A3B-NVFP4 + TriAttention
# Optimized for RTX 5090 (Blackwell) + WSL2 – April 2026

services:
  nemotron-cascade:
    image: vllm-triattention:1.0.0
    container_name: nemotron-cascade-2-triattn
    hostname: nemotron-cascade-2-triattn
    platform: linux/amd64
    ports:
      - "8000:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ~/.cache/triattention:/root/.cache/triattention
    ipc: host

    # GPU reservation - using deploy block
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

    environment:
      # Blackwell / WSL2 stability overrides
      - VLLM_USE_V1=0
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - VLLM_USE_FLASHINFER_MOE_FP8=1
      - VLLM_FLASHINFER_MOE_BACKEND=throughput

      # ── TriAttention Configuration (following official repo) ───────────────
      - TRIATTN_ENABLE=true                     # Master switch
      - TRIATTN_RUNTIME_KV_BUDGET=4096          # Moderate starting value (try 2048–8192 later)
      - TRIATTN_RUNTIME_PROTECT_PREFILL=true
      - TRIATTN_VERBOSE=1

      # Long context support
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1

      # Logging (DEBUG until TriAttention is confirmed working)
      - VLLM_LOGGING_LEVEL=DEBUG

    command:
      # Positional model argument
      - "chankhavu/Nemotron-Cascade-2-30B-A3B-NVFP4"

      # ── REQUIRED HYBRID ARCHITECTURE FLAGS ───────────────
      - "--mamba-ssm-cache-dtype"
      - "float32"                                             # Mamba SSM state must stay float32
      - "--trust-remote-code"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "qwen3_coder"
      - "--reasoning-parser"
      - "nemotron_v3"

      # ← FIX FOR 404 "model does not exist"
      - "--served-model-name"
      - "chankhavu/Nemotron-Cascade-2-30B-A3B-NVFP4"

      # ── CRITICAL TRIATTENTION FLAGS ───────────────────────
      - "--no-enable-prefix-caching"                          # Required by TriAttention
      - "--max-num-batched-tokens"
      - "1024"                                                # Helps stability on hybrid models

      # ── KV CACHE QUANTIZATION ─────────────────────────────
      - "--kv-cache-dtype"
      - "fp8"

      # ── MEMORY & CONTEXT MANAGEMENT ───────────────────────
      - "--dtype"
      - "auto"
      - "--gpu-memory-utilization"
      - "0.85"                                                # Safe increase thanks to TriAttention
      - "--enforce-eager"
      - "--max-model-len"
      - "262144"

    networks:
      - development-network

networks:
  development-network:
    external: true