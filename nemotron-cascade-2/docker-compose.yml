# Nemotron Cascade 2 on RTX 5090 (Blackwell)
services:
  nemotron-cascade:
    image: vllm/vllm-openai:latest
    container_name: nemotron-cascade-2
    hostname: nemotron-cascade-2
    platform: linux/amd64
    ports:
      - "8000:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    ipc: host
    environment:
      - VLLM_USE_V1=0 # Forces the stable V0 engine to avoid 'Engine Core' handshake errors on Blackwell
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]    
    command: 
      # --- vLLM CONFIGURATION DOCUMENTATION ---
      # --model: Specified model from HF. 
      - "--model"
      - "nvidia/Nemotron-Cascade-2-30B-A3B"
      
      # --trust-remote-code: Required for Nemotron-Cascade's custom Mamba-hybrid layers.
      - "--trust-remote-code"
      
      # --dtype half: Forces FP16. Essential for MoE models on consumer cards to keep weights at ~30GB.
      - "--dtype"
      - "half"
      
      # --gpu-memory-utilization: 0.80 reserves 25.6GB of your 32GB VRAM. 
      # Leaves 6.4GB for Windows/Driver overhead to prevent the WDDM "Black Screen" crash.
      - "--gpu-memory-utilization"
      - "0.80" 
      
      # --enforce-eager: Disables CUDA Graph pre-capture. 
      # Prevents the massive 10GB+ memory spike during boot that freezes Windows.
      - "--enforce-eager" 
      
      # --kv-cache-dtype fp8: Compresses context memory. 
      # Allows longer conversations without hitting the 32GB VRAM ceiling.
      - "--kv-cache-dtype"
      - "fp8"
      
      # --max-model-len: Caps context at 8k tokens. 
      # Keeps the memory footprint predictable during your first successful run.
      - "--max-model-len"
      - "8192"  
      
    networks:
      - development-network

networks:
  development-network:
    external: true