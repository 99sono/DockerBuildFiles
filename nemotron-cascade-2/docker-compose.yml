# Nemotron cascade 2 announcement: https://x.com/_weiping/status/2034877099908243746?s=20
services:
  nemotron-cascade:
    image: vllm/vllm-openai:latest
    container_name: nemotron-cascade-2
    platform: linux/amd64
    ports:
      - "8000:8000"
    volumes:
      # Maps your WSL2 home cache to the container to avoid re-downloading
      - ~/.cache/huggingface:/root/.cache/huggingface
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    command: >
      --model nvidia/Nemotron-Cascade-2-30B-A3B
      --trust-remote-code
      --dtype fp8
      --gpu-memory-utilization 0.90
      --max-model-len 4096
    networks:
      - development-network

networks:
  development-network:
    external: true
