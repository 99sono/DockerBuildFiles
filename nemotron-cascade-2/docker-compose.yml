services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: nemotron-cascade-2-vllm
    # Use GPU for inference
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8000:8000"
    environment:
      - HF_MODEL=chankhavu/Nemotron-Cascade-2-30B-A3B-NVFP4
    # Important: --kv-cache-dtype turbo ensures TurboQuant is used for the KV cache
    # --max-model-len sets the maximum context length (default: 32768)
    # To test larger contexts like 256k, change --max-model-len to 262144
    # Note: 256k context may exceed memory on some GPUs, test cautiously.
    command: >
      --model $HF_MODEL
      --kv-cache-dtype turbo
      --max-model-len 32768
      --trust-remote-code
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    shm_size: 10g
