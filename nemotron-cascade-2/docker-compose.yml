# Nemotron-Cascade-2-30B-A3B-NVFP4 + TriAttention
# Optimized for RTX 5090 (Blackwell) + WSL2 – April 2026

services:
  nemotron-cascade:
    image: vllm-triattention:1.0.0
    container_name: nemotron-cascade-2-triattn
    hostname: nemotron-cascade-2-triattn
    platform: linux/amd64
    ports:
      - "8000:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ~/.cache/triattention:/root/.cache/triattention
    ipc: host

    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

    environment:
      # Blackwell / WSL2 stability
      - VLLM_USE_V1=0
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - VLLM_USE_FLASHINFER_MOE_FP8=1
      - VLLM_FLASHINFER_MOE_BACKEND=throughput

      # ── TriAttention (following official repo recommendations) ─────────────
      - TRIATTN_ENABLE=true
      - TRIATTN_RUNTIME_KV_BUDGET=4096                  # Start moderate; we'll increase for chat
      - TRIATTN_RUNTIME_PROTECT_PREFILL=true
      - TRIATTN_VERBOSE=1

      # Long context support
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1

      # Logging — keep DEBUG until we confirm activation
      - VLLM_LOGGING_LEVEL=DEBUG

    command:
      - "chankhavu/Nemotron-Cascade-2-30B-A3B-NVFP4"

      # ── REQUIRED HYBRID ARCHITECTURE FLAGS ───────────────
      - "--mamba-ssm-cache-dtype"
      - "float32"
      - "--trust-remote-code"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "qwen3_coder"
      - "--reasoning-parser"
      - "nemotron_v3"

      # ── CRITICAL TRIATTENTION FLAGS (from repo) ───────────────────────
      - "--no-enable-prefix-caching"                    # Required by TriAttention
      - "--max-num-batched-tokens"
      - "1024"                                          # Required to avoid OOM during prefill

      # ── KV CACHE & MEMORY ─────────────────────────────────
      - "--kv-cache-dtype"
      - "fp8"
      - "--dtype"
      - "auto"
      - "--gpu-memory-utilization"
      - "0.85"
      - "--enforce-eager"
      - "--max-model-len"
      - "262144"

    networks:
      - development-network

networks:
  development-network:
    external: true