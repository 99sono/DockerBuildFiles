events {
    worker_connections 1024;
}

http {
    # Enable buffering for complete capture (unlike production where this is off)
    proxy_buffering on;
    proxy_request_buffering on;
    proxy_buffer_size 128k;
    proxy_buffers 8 256k;
    proxy_max_temp_file_size 10m;

    # Standard access log for metadata
    log_format main '$time_iso8601 [$remote_addr] "$request" '
                    '$status $body_bytes_sent '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    error_log /var/log/nginx/error.log warn;

    server {
        listen 8888;
        server_name _;

        location / {
            # Read and capture the full request body
            lua_need_request_body on;

            access_by_lua_block {
                -- Read the full request body
                ngx.req.read_body()
                local body = ngx.req.get_body_data() or ""

                -- Append to requests log
                local f = io.open("/var/log/debug/requests.log", "a")
                if f then
                    f:write(os.date("%Y-%m-%d %H:%M:%S") .. " REQUEST\n")
                    f:write("Method: " .. ngx.var.request_method .. "\n")
                    f:write("URI: " .. ngx.var.request_uri .. "\n")
                    f:write("Body:\n")
                    f:write(body .. "\n")
                    f:write("---\n")
                    f:close()
                end
            }

            # Proxy to vLLM backend
            proxy_pass http://vllm:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Capture the full response body chunk by chunk
            body_filter_by_lua_block {
                local chunk = ngx.arg[1]
                local is_last = ngx.arg[2]

                if chunk then
                    -- Accumulate in context
                    ngx.ctx.response_body = (ngx.ctx.response_body or "") .. chunk
                end

                -- When we reach the last chunk, write the complete response
                if is_last then
                    local f = io.open("/var/log/debug/responses.log", "a")
                    if f then
                        f:write(os.date("%Y-%m-%d %H:%M:%S") .. " RESPONSE\n")
                        f:write("Status: " .. ngx.var.status .. "\n")
                        f:write("Body:\n")
                        f:write(ngx.ctx.response_body or "")
                        f:write("\n")
                        f:write("---\n")
                        f:close()
                    end

                    -- Reset context for next request
                    ngx.ctx.response_body = nil
                end
            }
        }
    }
}