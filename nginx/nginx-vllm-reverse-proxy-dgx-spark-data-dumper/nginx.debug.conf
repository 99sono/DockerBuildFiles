# !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
# ⚠️ CAUTION: Log Directory Permissions Required
# !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
# The directory /var/log/nginx/ MUST have write permissions for the 'nobody'
# user (i.e., chmod 777 on the host's ./logs folder). Otherwise, the Lua
# scripts will fail to create requests.log and responses.log.
#
# On the host, run:
#   chmod -R 777 ./logs
#
# Without this, the Nginx worker processes (running as 'nobody') cannot write
# to the log files, and debugging data will not be captured.
# !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!

# ============================================================
# Nginx Debug Configuration for vLLM Reverse Proxy
# Purpose: Captures full Request and Response bodies for debugging.
# ============================================================

events {
    # Allow 1024 simultaneous connections per worker
    worker_connections 1024;
}

http {
    # ============================================================
    # Buffering Configuration
    # ============================================================
    # Enable buffering for complete request/response capture.
    # Unlike production where buffering may be disabled for streaming,
    # we buffer everything so Lua can inspect full bodies.
    proxy_buffering on;
    proxy_request_buffering on;
    
    # Increase buffer sizes to keep typical LLM prompts in memory.
    # If a prompt exceeds client_body_buffer_size, Nginx writes it to disk,
    # which can result in empty logs if not handled by ngx.req.get_body_file().
    client_max_body_size 50m;      # Allow up to 50MB payloads
    client_body_buffer_size 10m;   # Keep up to 10MB in RAM
    
    proxy_buffer_size 128k;
    proxy_buffers 8 256k;
    proxy_max_temp_file_size 10m;

    # ============================================================
    # Access Log Format
    # ============================================================
    # Define a structured log format with timestamp, client IP,
    # request line, status code, bytes sent, and user agent.
    log_format main '$time_iso8601 [$remote_addr] "$request" '
                    '$status $body_bytes_sent '
                    '"$http_user_agent"';

    # Write standard nginx access log (for quick checks via docker exec)
    access_log /var/log/nginx/access.log main;

    # Write nginx errors (warnings and above) to error log
    error_log /var/log/nginx/error.log warn;

    server {
        listen 8888;
        server_name _;

        location / {
            # ============================================================
            # Request Processing
            # ============================================================

            # Force nginx to read the request body before processing.
            # This is required for access_by_lua_block to see the body.
            lua_need_request_body on;

            # --- Capture Request ---
            # This Lua block runs before nginx forwards the request to vLLM.
            # It reads the full request body (from RAM or Disk) and writes it to requests.log.
            access_by_lua_block {
                -- Read the full request body from the client
                ngx.req.read_body()
                
                -- Attempt to get body from memory
                local body = ngx.req.get_body_data()
                
                -- Fallback: If body was too large for the memory buffer, read it from the temp file
                if not body then
                    local body_file = ngx.req.get_body_file()
                    if body_file then
                        local f_body = io.open(body_file, "rb")
                        if f_body then
                            body = f_body:read("*all")
                            f_body:close()
                        end
                    end
                end

                -- Append request details to the requests log
                -- Path: /var/log/nginx/requests.log (mounted to ./logs/ on host)
                local f, err = io.open("/var/log/nginx/requests.log", "a")
                if not f then
                    -- Log the error to the Nginx error log if the file cannot be opened
                    ngx.log(ngx.ERR, "LUA ERROR: Could not open requests.log: ", err)
                else
                    f:write(os.date("%Y-%m-%d %H:%M:%S") .. " REQUEST\n")
                    f:write("Method: " .. ngx.var.request_method .. "\n")
                    f:write("URI: " .. ngx.var.request_uri .. "\n")
                    f:write("Body:\n")
                    f:write(body or "[Empty or Unreadable Body]")
                    f:write("\n---\n")
                    f:flush() -- Ensure data is written to disk immediately
                    f:close()
                end
            }

            # --- Proxy to vLLM Backend ---
            # Forward the request to the vLLM server on the internal network.
            proxy_pass http://vllm:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # --- Capture Response ---
            # This Lua block runs after nginx receives each chunk from vLLM.
            # It accumulates all chunks and writes the complete response
            # to responses.log when the last chunk arrives.
            body_filter_by_lua_block {
                local chunk = ngx.arg[1]
                local is_last = ngx.arg[2]

                if chunk then
                    -- Accumulate response chunks in memory
                    ngx.ctx.response_body = (ngx.ctx.response_body or "") .. chunk
                end

                -- When the last chunk arrives (is_last is true), write the complete response
                if is_last then
                    -- Write complete response to responses.log
                    local f, err = io.open("/var/log/nginx/responses.log", "a")
                    if not f then
                        -- Log failure to Nginx error log
                        ngx.log(ngx.ERR, "LUA ERROR: Could not open responses.log: ", err)
                    else
                        f:write(os.date("%Y-%m-%d %H:%M:%S") .. " RESPONSE\n")
                        f:write("Status: " .. ngx.var.status .. "\n")
                        f:write("Body:\n")
                        f:write(ngx.ctx.response_body or "[Empty Response]")
                        f:write("\n---\n")
                        f:flush() -- Force write to disk
                        f:close()
                    end

                    -- Reset accumulated context for the next request to prevent memory leaks
                    ngx.ctx.response_body = nil
                end
            }
        }
    }
}