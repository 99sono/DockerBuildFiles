events {
    # Allow 1024 simultaneous connections per worker
    worker_connections 1024;
}

http {
    # ============================================================
    # Buffering Configuration
    # ============================================================
    # Enable buffering for complete request/response capture.
    # Unlike production where buffering may be disabled for streaming,
    # we buffer everything so Lua can inspect full bodies.
    proxy_buffering on;
    proxy_request_buffering on;
    proxy_buffer_size 128k;
    proxy_buffers 8 256k;
    proxy_max_temp_file_size 10m;

    # ============================================================
    # Access Log Format
    # ============================================================
    # Define a structured log format with timestamp, client IP,
    # request line, status code, bytes sent, and user agent.
    log_format main '$time_iso8601 [$remote_addr] "$request" '
                    '$status $body_bytes_sent '
                    '"$http_user_agent"';

    # Write standard nginx access log (for quick checks via docker exec)
    access_log /var/log/nginx/access.log main;

    # Write nginx errors (warnings and above) to error log
    error_log /var/log/nginx/error.log warn;

    server {
        listen 8888;
        server_name _;

        location / {
            # ============================================================
            # Request Processing
            # ============================================================

            # Force nginx to read the request body before processing
            lua_need_request_body on;

            # --- Capture Request ---
            # This Lua block runs before nginx forwards the request to vLLM.
            # It reads the full request body and writes it to requests.log.
            access_by_lua_block {
                -- Read the full request body from the client
                ngx.req.read_body()
                local body = ngx.req.get_body_data() or ""

                -- Append request details to the requests log
                -- Path: /var/log/nginx/requests.log (mounted to ./logs/ on host)
                local f = io.open("/var/log/nginx/requests.log", "a")
                if f then
                    f:write(os.date("%Y-%m-%d %H:%M:%S") .. " REQUEST\n")
                    f:write("Method: " .. ngx.var.request_method .. "\n")
                    f:write("URI: " .. ngx.var.request_uri .. "\n")
                    f:write("Body:\n")
                    f:write(body .. "\n")
                    f:write("---\n")
                    f:close()
                end
            }

            # --- Proxy to vLLM Backend ---
            # Forward the request to the vLLM server on the internal network.
            proxy_pass http://vllm:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # --- Capture Response ---
            # This Lua block runs after nginx receives each chunk from vLLM.
            # It accumulates all chunks and writes the complete response
            # to responses.log when the last chunk arrives.
            body_filter_by_lua_block {
                local chunk = ngx.arg[1]
                local is_last = ngx.arg[2]

                if chunk then
                    -- Accumulate response chunks in memory
                    ngx.ctx.response_body = (ngx.ctx.response_body or "") .. chunk
                end

                -- When the last chunk arrives, write the complete response
                if is_last then
                    -- Write complete response to responses.log
                    local f = io.open("/var/log/nginx/responses.log", "a")
                    if f then
                        f:write(os.date("%Y-%m-%d %H:%M:%S") .. " RESPONSE\n")
                        f:write("Status: " .. ngx.var.status .. "\n")
                        f:write("Body:\n")
                        f:write(ngx.ctx.response_body or "")
                        f:write("\n")
                        f:write("---\n")
                        f:close()
                    end

                    -- Reset accumulated context for the next request
                    ngx.ctx.response_body = nil
                end
            }
        }
    }
}