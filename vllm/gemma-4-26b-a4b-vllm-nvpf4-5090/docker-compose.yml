services:
  gemma-4-26b-it-nvfp4:
    image: vllm/vllm-openai:nightly
    container_name: gemma-4-26b-it-nvfp4
    hostname: gemma-4-26b-it-nvfp4
    runtime: nvidia
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - /dev/shm:/dev/shm
    shm_size: "32g"
    ipc: host

    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HUB_ENABLE_HF_TRANSFER=1
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      # Forces the most optimized attention kernel for long sequences
      - VLLM_ATTENTION_BACKEND=FLASHINFER
    command:
      - "RedHatAI/gemma-4-26B-A4B-it-NVFP4"
      - "--served-model-name"
      - "gemma-4-26b-it-nvfp4"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--gpu-memory-utilization"
      - "0.85" # Push to 95% to maximize the pool for that 98k cache
      - "--max-model-len"
      - "98304" # Your required context length
      - "--max-num-batched-tokens"
      - "8192" # Massive increase to process long prompts faster
      - "--kv-cache-dtype"
      - "fp8_e4m3" # Essential to fit 98k on one GPU
      - "--quantization"
      - "compressed-tensors"
      - "--enable-prefix-caching" # Huge speed boost for repeated context
      - "--enable-chunked-prefill" # Prevents "stuttering" on long inputs
      - "--max-num-seqs"
      - "2" # Limiting concurrent requests to focus GPU power on one long context at a time
      - "--reasoning-parser"
      - "gemma4"
      - "--tool-call-parser"
      - "gemma4"
      - "--moe-backend"
      - "cutlass"
      - "--trust-remote-code"
    networks:
      - development-network

networks:
  development-network:
    external: true