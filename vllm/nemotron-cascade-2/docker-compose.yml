# Nemotron-Cascade-2-30B-A3B-NVFP4 (Optimized Speed Path)
# Hardware: RTX 5090 (Blackwell) + WSL2
# Strategy: Native Blackwell FP4 execution with high batching

services:
  nemotron-cascade:
    image: vllm/vllm-openai:latest
    container_name: nemotron-cascade-2-nvfp4
    hostname: nemotron-cascade-2-nvfp4
    platform: linux/amd64
    ports:
      - "8000:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    ipc: host

    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

    environment:
      # Use 'spawn' for stability on Blackwell cards in WSL2
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      # Enable high-performance MoE kernels for FP8/FP4
      - VLLM_USE_FLASHINFER_MOE_FP8=1
      - VLLM_FLASHINFER_MOE_BACKEND=throughput

    command:
      - "chankhavu/Nemotron-Cascade-2-30B-A3B-NVFP4"
      - "--served-model-name"
      - "chankhavu/Nemotron-Cascade-2-30B-A3B-NVFP4"
      - "--trust-remote-code"
      - "--quantization"
      - "modelopt_fp4"
      - "--kv-cache-dtype"
      - "fp8_e4m3"
      - "--gpu-memory-utilization"
      - "0.75"
      - "--max-model-len"
      - "131072"
      - "--max-num-batched-tokens"
      - "32768"
      - "--mamba-ssm-cache-dtype"
      - "float32"
      - "--enforce-eager"
      - "--tool-call-parser"
      - "qwen3_coder"
      - "--reasoning-parser"
      - "nemotron_v3"

    networks:
      - development-network

networks:
  development-network:
    external: true