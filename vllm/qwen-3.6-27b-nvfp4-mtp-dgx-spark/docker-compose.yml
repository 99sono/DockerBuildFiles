services:
  qwen-nvfp4-mtp:
    image: vllm/vllm-openai:v0.20.2-ubuntu2404
    container_name: "${CONTAINER_NAME:-qwen-3.6-27b-nvfp4-mtp-dgx-spark}"
    hostname: inference-server
    platform: linux/arm64

    # Ports are not exposed.
    # Use the nginx/nginx-vllm-reverse-proxy-dgx-spark/nginx.conf to speak with the model
    # ports:
      # - "8000:8000"

    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - /dev/shm:/dev/shm

    shm_size: "32g"
    ipc: host

    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

    environment:
      VLLM_WORKER_MULTIPROC_METHOD: spawn
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
      HF_HUB_ENABLE_HF_TRANSFER: "1"

    command:
      - "--model"
      - "sakamakismile/Qwen3.6-27B-Text-NVFP4-MTP"
      - "--served-model-name"
      - "Qwen3.6-27B-Text-NVFP4-MTP"
      - "--api-key"
      - "${VLLM_API_KEY:-dummy-key}"
      - "--trust-remote-code"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--language-model-only"
      - "--quantization"
      - "modelopt"
      - "--gpu-memory-utilization"
      - "0.9"
      - "--max-model-len"
      - "262144"
      - "--max-num-seqs"
      - "2"
      - "--max-num-batched-tokens"
      - "65536"
      - "--kv-cache-dtype"
      - "fp8"
      - "--reasoning-parser"
      - "qwen3"
      - "--tool-call-parser"
      - "qwen3_coder"
      - "--enable-auto-tool-choice"
      - "--enable-prefix-caching"
      - "--enable-chunked-prefill"
      - "--safetensors-load-strategy"
      - "prefetch"
      - "--max-cudagraph-capture-size"
      - "1"
      - "--speculative-config"
      - '{"method":"qwen3_5_mtp","num_speculative_tokens":3}'

    networks:
      - development-network

networks:
  development-network:
    external: true
