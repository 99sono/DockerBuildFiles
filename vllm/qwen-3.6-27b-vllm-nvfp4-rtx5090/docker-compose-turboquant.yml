version: "3.9"

services:
  qwen-3-6-27b-nvfp4-mtp-turbo:
    image: vllm/vllm-openai:v0.20.0-cu130-ubuntu2404
    container_name: qwen-3-6-27b-nvfp4-mtp-turbo
    hostname: qwen-3-6-27b-nvfp4-mtp-turbo
    platform: linux/amd64

    ports:
      - "8000:8000"

    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - /dev/shm:/dev/shm

    shm_size: "32g"
    ipc: host

    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

    environment:
      VLLM_WORKER_MULTIPROC_METHOD: spawn
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
      HF_HUB_ENABLE_HF_TRANSFER: "1"

    command:
      - "sakamakismile/Qwen3.6-27B-Text-NVFP4-MTP"
      - "--served-model-name"
      - "qwen3.6-27b-text-nvfp4-mtp"
      - "--trust-remote-code"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--gpu-memory-utilization"
      - "0.9"
      # TurboQuant target: 256K context
      - "--max-model-len"
      - "262144"
      - "--max-num-seqs"
      - "2"
      - "--max-num-batched-tokens"
      - "16384"
      - "--kv-cache-dtype"
      - "turboquant_k8v4"
      - "--quantization"
      - "modelopt"
      - "--enable-prefix-caching"
      - "--enable-chunked-prefill"
      - "--reasoning-parser"
      - "qwen3"
      - "--language-model-only"
      - "--moe-backend"
      - "cutlass"
      - "--speculative-config"
      - '{"method":"qwen3_5_mtp","num_speculative_tokens":3}'

    networks:
      - development-network

networks:
  development-network:
    external: true
